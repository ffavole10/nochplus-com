<!doctype html>
<html lang="en">
  <head>
    <style>
      @font-face {
        font-family: 'AntroVectra';
        src: url('https://db.onlinewebfonts.com/t/8010f0cdf53c71258e475a7a7482eea9.woff2') format('woff2'),
             url('https://db.onlinewebfonts.com/t/8010f0cdf53c71258e475a7a7482eea9.woff') format('woff');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
    </style>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>NOCH+</title>
    <meta name="description" content="NOCH Power Operations Platform" />
    <meta name="author" content="NOCH+" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="shortcut icon" href="/favicon-32.png" />

    <!-- Apple Touch Icon (critical for iOS Home Screen) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme and Status Bar -->
    <meta name="theme-color" content="#25b3a5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="NOCH+" />

    <!-- iOS splash (single source, scaled by iOS with theme background) -->
    <link rel="apple-touch-startup-image" href="/noch-splash.png" />
    <link rel="apple-touch-startup-image" href="/noch-splash.png"
      media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="/noch-splash.png"
      media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/noch-splash.png"
      media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/noch-splash.png"
      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="/noch-splash.png"
      media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3)" />

    <!-- Open Graph -->
    <meta property="og:title" content="NOCH+" />
    <meta property="og:site_name" content="NOCH+" />
    <meta property="og:description" content="NOCH Power Operations Platform" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/noch-icon-512.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="NOCH+" />
    <meta name="twitter:description" content="NOCH Power Operations Platform" />
    <meta name="twitter:image" content="/noch-icon-512.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
